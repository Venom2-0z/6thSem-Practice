name: My Second WorkFlows
on: push
jobs:
  say-pr-received:  
    runs-on:  ubuntu-latest

    steps:
      - name: Print message
        run: echo "Request received, thank you for your contribution!"
  
  test:
    runs-on:  ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: list file
        run: ls 
      - name: setup node
        uses: actions/setup-node@v4
      - name: check version
        run: node --version
      - name: runtime test
        run: npm run test

  deploy_app:
    runs-on:  ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: list file
        run: ls 
      - name: setup node
        uses: actions/setup-node@v4
      - name: check version
        run: node --version
      - name: runtime test
        run: npm run test
      - name: start server
        run: node server.js